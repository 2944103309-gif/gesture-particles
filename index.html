<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Gesture Particles</title>

<style>
html,body {
  margin:0;
  padding:0;
  background:#000;
  overflow:hidden;
  touch-action:none;
  font-family: -apple-system, BlinkMacSystemFont;
}
#ui {
  position:fixed;
  bottom:16px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:10;
}
button {
  background:rgba(255,255,255,0.12);
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:14px;
  backdrop-filter: blur(10px);
}
input[type=color] {
  width:42px;
  height:42px;
  border:none;
  border-radius:50%;
}
video {
  display:none;
}
</style>
</head>

<body>
<video id="video" playsinline></video>

<div id="ui">
  <button onclick="setShape('heart')">❤️</button>
  <button onclick="setShape('flower')">🌸</button>
  <button onclick="setShape('saturn')">🪐</button>
  <input type="color" id="colorPicker" value="#ffffff">
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
/* ---------- Three.js ---------- */
const scene = new THREE.Scene()
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000)
camera.position.z = 120

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(innerWidth, innerHeight)
renderer.setPixelRatio(Math.min(devicePixelRatio, 2))
document.body.appendChild(renderer.domElement)

let geometry = new THREE.BufferGeometry()
const COUNT = 3000
let positions = new Float32Array(COUNT * 3)

function generateHeart(scale=30){
  for(let i=0;i<COUNT;i++){
    let t = Math.random()*Math.PI*2
    let r = scale*(1-Math.sin(t))
    positions[i*3]   = r*Math.cos(t)
    positions[i*3+1] = r*Math.sin(t)
    positions[i*3+2] = (Math.random()-0.5)*10
  }
}

generateHeart()
geometry.setAttribute('position', new THREE.BufferAttribute(positions,3))

const material = new THREE.PointsMaterial({
  size:1.8,
  color:'#ffffff',
  transparent:true
})

const points = new THREE.Points(geometry, material)
scene.add(points)

/* ---------- Shape Switch ---------- */
function setShape(type){
  if(type==='heart') generateHeart()
  geometry.attributes.position.needsUpdate = true
}

/* ---------- Color ---------- */
document.getElementById('colorPicker').addEventListener('input',e=>{
  material.color.set(e.target.value)
})

/* ---------- Hands ---------- */
let scaleTarget = 1

const hands = new Hands({
  locateFile:file=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
})

hands.setOptions({
  maxNumHands:2,
  minDetectionConfidence:0.6,
  minTrackingConfidence:0.6
})

hands.onResults(res=>{
  if(res.multiHandLandmarks?.length===2){
    const a = res.multiHandLandmarks[0][0]
    const b = res.multiHandLandmarks[1][0]
    const dx = a.x - b.x
    const dy = a.y - b.y
    const d = Math.sqrt(dx*dx + dy*dy)
    scaleTarget = THREE.MathUtils.clamp(d*3,0.5,2.5)
  }
})

const video = document.getElementById('video')
const cam = new Camera(video,{
  onFrame:async()=>await hands.send({image:video}),
  width:640,height:480
})
cam.start()

/* ---------- Loop ---------- */
function animate(){
  requestAnimationFrame(animate)
  points.scale.lerp(new THREE.Vector3(scaleTarget,scaleTarget,scaleTarget),0.1)
  points.rotation.y += 0.002
  renderer.render(scene,camera)
}
animate()

window.onresize=()=>{
  camera.aspect=innerWidth/innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth,innerHeight)
}
</script>
</body>
</html>
